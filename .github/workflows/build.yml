name: Build release

# Срабатывает при пуше тега версии (например v1.0.0) или вручную из вкладки
# "Actions". Собирает две вещи и вешает их на GitHub Release:
#   * ZapretControl-portable.exe  — один файл, ничего ставить не надо
#   * ZapretControl-<версия>.zip  — папка с node_modules внутри (то, что ты
#     раздаёшь в Discord: распаковал, сделал ярлык, запустил)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: core     # все файлы приложения живут в core/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        run: npm run dist

      - name: Pack release zip (app + node_modules)
        run: npm run pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZapretControl
          path: |
            core/dist/*.exe
            release/*.zip

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            core/dist/*.exe
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
