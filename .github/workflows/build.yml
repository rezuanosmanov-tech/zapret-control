name: Build release

# Срабатывает при пуше тега версии (например v1.0.1) или вручную из вкладки
# "Actions". Собирает раздаточный архив ZapretControl-<версия>.zip — папку с
# node_modules внутри — и прикрепляет его к GitHub Release. Именно эту ссылку
# ты кидаешь в Discord. Portable exe больше не собирается.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: core     # все файлы приложения живут в core/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Pack release zip (app + node_modules)
        run: npm run pack

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZapretControl
          path: release/*.zip

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
